name: Deploy Kasa Cue

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: kasa-cue-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-secret
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/kasa-cue
          chmod 600 ~/.ssh/kasa-cue
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='desktop-downloads' \
            --exclude='electron/node_modules' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/kasa-cue" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Write production env
        run: |
          printf '%s' "${{ secrets.PRODUCTION_ENV }}" | ssh -i ~/.ssh/kasa-cue "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cat > '${{ secrets.DEPLOY_PATH }}/.env.production' && chmod 600 '${{ secrets.DEPLOY_PATH }}/.env.production'"

      - name: Install, build, and restart
        run: |
          ssh -i ~/.ssh/kasa-cue "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && \
            npm ci && \
            npx prisma generate && \
            npm run build && \
            sudo systemctl restart kasa-cue && \
            sudo systemctl --no-pager --full status kasa-cue"
