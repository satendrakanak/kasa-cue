name: Deploy Kasa Cue

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: kasa-cue-production
  cancel-in-progress: true

env:
  DEPLOY_HOST: 13.206.210.16
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /var/www/kasa-cue

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    environment: KASACUE_DEPLOYMENT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-secret
          DATABASE_URL: mysql://ci:ci@localhost:3306/kasa_cue_ci
          OPENAI_API_KEY: ci-build-key

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: KASACUE_DEPLOYMENT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/kasa-cue
          chmod 600 ~/.ssh/kasa-cue
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='desktop-downloads' \
            --exclude='electron/node_modules' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/kasa-cue" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install, build, and restart
        run: |
          ssh -i ~/.ssh/kasa-cue "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
            npm ci && \
            npx prisma generate && \
            npx prisma migrate deploy && \
            npm run db:seed && \
            npm run build && \
            sudo systemctl restart kasa-cue && \
            sudo systemctl --no-pager --full status kasa-cue"
