name: Build Windows Desktop

on:
  push:
    branches:
      - master
      - main
    paths:
      - "electron/**"
      - "electron-builder.desktop.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch:

concurrency:
  group: kasa-cue-windows
  cancel-in-progress: true

env:
  DEPLOY_HOST: 13.206.210.16
  DEPLOY_PATH: /var/www/kasa-cue
  DEPLOY_USER: ubuntu

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run desktop:pack:windows

      - name: Verify installer
        shell: pwsh
        run: |
          $installer = "dist/Kasa-Cue-win-x64.exe"
          if (!(Test-Path $installer)) {
            throw "Windows installer was not generated at $installer"
          }
          Get-Item $installer | Format-List Name, Length, LastWriteTime

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kasa-Cue-Windows-x64
          path: dist/Kasa-Cue-win-x64.exe
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Windows installer
    runs-on: ubuntu-latest
    needs: build
    environment: KASACUE_DEPLOYMENT
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: Kasa-Cue-Windows-x64
          path: dist

      - name: Configure deployment key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/kasa-cue
          chmod 600 ~/.ssh/kasa-cue
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Publish installer to production
        run: |
          ssh -i ~/.ssh/kasa-cue "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH/desktop-downloads' '$DEPLOY_PATH/.next/standalone/desktop-downloads'"
          scp -i ~/.ssh/kasa-cue \
            dist/Kasa-Cue-win-x64.exe \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/desktop-downloads/Kasa-Cue-win-x64.exe"
          scp -i ~/.ssh/kasa-cue \
            dist/Kasa-Cue-win-x64.exe \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.next/standalone/desktop-downloads/Kasa-Cue-win-x64.exe"
